name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, dom, gd, json, gettext, fileinfo, zlib, libxml, mbstring, curl, openssl, phar
          coverage: none
      - name: PHP Syntax Check
        run: |
          errors=$(find lib/ app/ -name '*.php' -exec php -l {} \; 2>&1 | grep -v "No syntax errors detected" || true)
          if [ -n "$errors" ]; then
            echo "$errors"
            exit 1
          fi

  composer-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Validate composer.json
        run: composer validate --strict

  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: syspass_test
          MYSQL_DATABASE: syspass_test
          MYSQL_USER: syspass
          MYSQL_PASSWORD: syspass_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, dom, gd, json, gettext, fileinfo, zlib, libxml, mbstring, curl, openssl, phar
          coverage: xdebug
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Run PHPUnit
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: syspass_test
          DB_USER: syspass
          DB_PASS: syspass_test
        run: vendor/bin/phpunit --configuration tests/phpunit.xml --testdox || true

  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: PHPStan
        run: vendor/bin/phpstan analyse --level 5 --no-progress lib/ app/ || true
